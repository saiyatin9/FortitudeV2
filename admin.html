<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Fortitude Fabrics</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { padding-top: 0; background-color: var(--bg-secondary); }
    .admin-header {
      background: #fff;
      padding: 1.5rem 5%;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .admin-container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 5%;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .data-table th, .data-table td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.9rem;
    }
    .data-table th {
      background: var(--bg-tertiary);
      font-family: var(--font-label);
      font-weight: 600;
      color: var(--accent-cyan);
      letter-spacing: 1px;
    }
    .data-table tr:hover { background: #fafafa; }
    
    .action-btn {
      background: none;
      border: none;
      color: #e53935;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .action-btn:hover { background: #ffebee; }
    
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }
    
    /* Custom Checkbox */
    .contacted-cb {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header class="admin-header">
    <div style="display: flex; align-items: center; gap: 1rem;">
      <img src="logo.jpg" alt="Fortitude Fabrics" style="height: 40px;">
      <h2 style="margin: 0; font-size: 1.5rem; border-left: 2px solid var(--border-color); padding-left: 1rem;">Lead Management</h2>
    </div>
    <div>
      <a href="/api/admin/export" class="btn btn-primary btn-sm">
        <span class="material-icons" style="font-size: 1rem;">download</span> Export CSV
      </a>
      <a href="/" class="btn btn-ghost btn-sm" style="margin-left: 1rem;">View Site</a>
    </div>
  </header>

  <main class="admin-container">
    <table class="data-table">
      <thead>
        <tr>
          <th style="width: 50px;">ID</th>
          <th style="width: 120px;">Date</th>
          <th style="width: 150px;">Name</th>
          <th style="width: 150px;">Company</th>
          <th style="width: 250px;">Contact Info</th>
          <th>Product / Details</th>
          <th style="width: 80px; text-align: center;">Contacted</th>
          <th style="width: 60px; text-align: center;">Delete</th>
        </tr>
      </thead>
      <tbody id="leads-body">
        <tr><td colspan="8" class="empty-state">Loading leads...</td></tr>
      </tbody>
    </table>
  </main>

  <script>
    async function loadLeads() {
      try {
        const response = await fetch('/api/admin/contacts');
        const leads = await response.json();
        
        const tbody = document.getElementById('leads-body');
        
        if (leads.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No contact submissions yet.</td></tr>';
          return;
        }

        tbody.innerHTML = leads.map(lead => `
          <tr id="lead-${lead.id}">
            <td style="color: var(--text-secondary); font-family: var(--font-mono);">#${lead.id}</td>
            <td style="font-size: 0.8rem; color: var(--text-secondary);">${new Date(lead.created_at).toLocaleDateString()}</td>
            <td style="font-weight: 500;">${lead.name}</td>
            <td>${lead.company}</td>
            <td>
              <div><a href="mailto:${lead.email}" style="color: var(--accent-cyan);">${lead.email}</a></div>
              <div style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px;">${lead.phone || '-'}</div>
            </td>
            <td>
              <div style="font-size: 0.8rem; font-family: var(--font-label); color: var(--accent-cyan);">${lead.product || 'General'} | ${lead.volume || 'No volume specified'}</div>
              <div style="margin-top: 4px; line-height: 1.4;">${lead.message}</div>
            </td>
            <td style="text-align: center;">
              <input type="checkbox" class="contacted-cb" 
                ${lead.contacted ? 'checked' : ''} 
                onchange="toggleContacted(${lead.id}, this.checked)">
            </td>
            <td style="text-align: center;">
              <button class="action-btn" onclick="deleteLead(${lead.id})" title="Delete Lead">
                <span class="material-icons">delete</span>
              </button>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Failed to load leads:', error);
      }
    }

    async function toggleContacted(id, status) {
      try {
        await fetch(`/api/admin/contacts/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contacted: status })
        });
      } catch (error) {
        alert('Failed to update status');
      }
    }

    async function deleteLead(id) {
      if (!confirm('Are you sure you want to delete this lead? This cannot be undone.')) return;
      
      try {
        const response = await fetch(`/api/admin/contacts/${id}`, { method: 'DELETE' });
        if (response.ok) {
          document.getElementById(`lead-${id}`).remove();
        } else {
          alert('Failed to delete lead');
        }
      } catch (error) {
        alert('Failed to delete lead');
      }
    }

    // Load leads on start
    loadLeads();
  </script>
</body>
</html>
